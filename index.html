
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Quiz Master</title>
    <!-- Anti-flash: apply theme class before first paint to avoid flicker -->
    <script>
      (function () {
        // Load theme preference
        try {
          var stored = localStorage.getItem('quiz-ia-theme');
          var pref = stored ? JSON.parse(stored).state.preference : 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }

        // Initialize config object for runtime variables
        window.__QUIZ_IA_CONFIG__ = {
          GEMINI_API_KEY: ''
          // API key will be set by config.js or environment at runtime
        };
      })();
    </script>
    <!-- Load environment config at runtime (not compiled into bundle) -->
    <script src="/config.js"></script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
